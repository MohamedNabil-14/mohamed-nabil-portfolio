<!DOCTYPE html>
<!-- ============================================================
     PROJECTS.HTML — filterable gallery of all UI/UX projects,
     generated from assets/data/projects.js. Filtering handled
     by assets/js/filters.js with smooth card transitions.
     ============================================================ -->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects — Mohamed Nabil, UI/UX Designer</title>
  <meta name="description" content="All work in one place: web, mobile, dashboard, SharePoint and Power Apps design projects plus graphic design (Design / Logo / Drawing) — imported from Behance.">
  <meta name="robots" content="index, follow">
  <meta property="og:type" content="website">
  <meta property="og:title" content="Projects — Mohamed Nabil">
  <meta property="og:description" content="Web, mobile, dashboard, SharePoint and Power Apps design projects with case studies.">
  <meta name="twitter:card" content="summary_large_image">
  <link rel="icon" href="favicon.ico" sizes="any">
  <link rel="apple-touch-icon" href="assets/images/icons/apple-touch-icon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/variables.css">
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/responsive.css">
  <link rel="stylesheet" href="assets/css/animations.css">
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <main id="main">
    <section class="section" style="padding-top:calc(var(--nav-height) + 4rem)" aria-label="All projects">
      <div class="container">
        <div class="section-head">
          <p class="eyebrow" data-reveal>The exhibition</p>
          <h1 class="display" style="font-size:clamp(2rem,4.5vw,3.2rem);margin-top:1rem" data-reveal data-reveal-delay="80">All projects</h1>
          <p data-reveal data-reveal-delay="160">UI/UX and Graphic Design in one gallery. Filter by discipline — the Graphic Design tab reveals its own sub-categories. Every card links back to Behance.</p>
        </div>

        <!-- Two-level filter pills injected by filters.js -->
        <div class="filters" id="projects-filters" role="group" aria-label="Filter projects by category"></div>
        <div class="filters filters--sub" id="graphics-subfilters" role="group" aria-label="Graphic design sub-categories" hidden></div>
        <p class="muted" id="projects-filters-count" aria-live="polite" style="text-align:center;font-size:var(--text-sm);margin-bottom:2rem"></p>

        <!-- Cards injected from DATA.projects -->
        <div class="grid grid--3" id="projects-grid" style="position:relative"></div>
      </div>
    </section>
  </main>

  <script src="assets/data/site.js"></script>
  <script src="assets/data/projects.js"></script>
  <script src="assets/data/graphics.js"></script>
  <script src="assets/data/certificates.js"></script>
  <script src="assets/data/experience.js"></script>
  <script src="assets/data/skills.js"></script>
  <script src="assets/js/main.js"></script>
  <script src="assets/js/animations.js"></script>
  <script src="assets/js/filters.js"></script>
  <script src="assets/js/gallery.js"></script>
  <script src="assets/js/portfolio.js"></script>
</body>
</html>
